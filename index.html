<h1>Two-Bit Alchemist</h1>
<h2>Name explanation</h2>
<p>Two-Bit Alchemist is meant to be a <a
href="https://www.imdb.com/title/tt1355642/"
title="Fullmetal Alchemist... (Fullmetal Alchemist) | IMDb">Fullmetal 
Alchemist</a>-style moniker, in which the alchemical medium is two bits,
i.e. <code>0</code> and <code>1</code>.</p>

<p><small>I also like that it evokes <a href="http://www.thefreedictionary.com/two-bit" title="Definition of two-bit on The Free Dictionary">the slang sense of <em>two-bit</em></a>.</small></p>
